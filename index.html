<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Bookstore</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📚 Online Bookstore</h1>

<input type="text" id="searchBar" placeholder="Search books...">

<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

</header>


<section class="books" id="bookList">

<div class="book">
<img src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1576707604i/49444404.jpg">
<h3>python</h3>
<p>$800</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="book">
<img src="https://m.media-amazon.com/images/I/51xiwRkS2oL._AC_UF1000,1000_QL80_.jpg">
<h3>java</h3>
<p>$700</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="book">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5vqZVXeitvq1lG7AAfR84Xl-9TuUpCxuh8g&s">
<h3>English</h3>
<p>$600</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="book">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTwF1smsRbU2TLldTcjNdYqvRmCeexZ2qU4vw&s">
<h3>Tamil</h3>
<p>$500</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

</section>


<footer>
<p>© 2026 Online Bookstore | Project</p>
</footer>

<script src="script.js"></script>

</body>
</html>
