<!DOCTYPE html>
<html>
<head>
<title>Online Book Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📚 Online Book Store</h1>

<input type="text" id="search" placeholder="Search books..." onkeyup="searchBooks()">

<div class="cart-icon">
🛒 Cart (<span id="cart-count">0</span>)
</div>

</header>

<div class="container" id="product-list">

<div class="card" data-name="html">
<img src="https://via.placeholder.com/150">
<h3>HTML Book</h3>
<p>₹200</p>
<button onclick="addToCart('HTML Book',200)">Add to Cart</button>
</div>

<div class="card" data-name="css">
<img src="https://via.placeholder.com/150">
<h3>CSS Book</h3>
<p>₹250</p>
<button onclick="addToCart('CSS Book',250)">Add to Cart</button>
</div>

<div class="card" data-name="javascript">
<img src="https://via.placeholder.com/150">
<h3>JavaScript Book</h3>
<p>₹500</p>
<button onclick="addToCart('JavaScript Book',500)">Add to Cart</button>
</div>

<div class="card" data-name="python">
<img src="https://via.placeholder.com/150">
<h3>Python Book</h3>
<p>₹600</p>
<button onclick="addToCart('Python Book',600)">Add to Cart</button>
</div>

</div>

<section class="cart-section">

<h2>🛒 Shopping Cart</h2>

<ul id="cartItems"></ul>

<h3>Total: ₹<span id="total">0</span></h3>

</section>

<script src="script.js"></script>

</body>
</html>
